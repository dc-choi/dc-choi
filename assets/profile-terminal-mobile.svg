<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 500 500">
  <title id="title">DongChul Choi — mobile primary technology stack</title>
  <desc id="desc">A compact mobile terminal-style card listing the primary backend, API, data, AWS, and operations stack used by DongChul Choi at KINOLIGHTS.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#0b1324"/>
    </linearGradient>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-variant-ligatures: none; }
      .label { fill: #d29922; font-size: 15.5px; font-weight: 700; }
      .value { fill: #b6d7ff; font-size: 13.2px; }
      .leader { stroke: #3d4757; stroke-width: 1.4; stroke-dasharray: 2 6; }
    </style>
  </defs>

  <rect width="500" height="500" rx="22" fill="url(#background)"/>
  <rect x="1" y="1" width="498" height="498" rx="21" fill="none" stroke="#30363d" stroke-width="2"/>

  <g class="mono">
    <text x="32" y="45" fill="#f0f6fc" font-size="19" font-weight="700">dc-choi@github</text>
    <line x1="214" y1="39" x2="468" y2="39" stroke="#4b5563" stroke-width="1"/>
    <text x="32" y="71" fill="#8b949e" font-size="13">$ stack --primary</text>
    <text x="32" y="97" fill="#8b949e" font-size="13">Backend Engineer @ KINOLIGHTS</text>

    <line x1="32" y1="119" x2="468" y2="119" stroke="#293548" stroke-width="1"/>
    <text x="32" y="152" class="label">Backend</text><line x1="140" x2="468" y1="147" y2="147" class="leader"/><text x="44" y="177" class="value">TypeScript · Node.js · NestJS</text>
    <text x="32" y="223" class="label">API</text><line x1="140" x2="468" y1="218" y2="218" class="leader"/><text x="44" y="248" class="value">GraphQL · Apollo · REST</text>
    <text x="32" y="294" class="label">Data</text><line x1="140" x2="468" y1="289" y2="289" class="leader"/><text x="44" y="319" class="value">MySQL · Prisma · TypeORM · DynamoDB</text>
    <text x="32" y="365" class="label">AWS</text><line x1="140" x2="468" y1="360" y2="360" class="leader"/><text x="44" y="390" class="value">ECS Fargate · Lambda · RDS · SQS</text>
    <text x="32" y="436" class="label">Ops</text><line x1="140" x2="468" y1="431" y2="431" class="leader"/><text x="44" y="461" class="value">Docker · GitHub Actions · Datadog · OpenSearch</text>
  </g>
</svg>
