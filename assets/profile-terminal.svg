<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1100 370">
  <title id="title">DongChul Choi — primary technology stack</title>
  <desc id="desc">A compact terminal-style card listing the primary backend, API, data, AWS, and operations stack used by DongChul Choi at KINOLIGHTS.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#0b1324"/>
    </linearGradient>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-variant-ligatures: none; }
      .label { fill: #d29922; font-size: 17px; font-weight: 700; }
      .value { fill: #b6d7ff; font-size: 16px; }
      .leader { stroke: #3d4757; stroke-width: 1.4; stroke-dasharray: 2 6; }
    </style>
  </defs>

  <rect width="1100" height="370" rx="22" fill="url(#background)"/>
  <rect x="1" y="1" width="1098" height="368" rx="21" fill="none" stroke="#30363d" stroke-width="2"/>

  <g class="mono">
    <text x="52" y="54" fill="#f0f6fc" font-size="20" font-weight="700">dc-choi@github</text>
    <line x1="238" y1="48" x2="1048" y2="48" stroke="#4b5563" stroke-width="1"/>
    <text x="52" y="80" fill="#8b949e" font-size="14">$ stack --primary</text>
    <text x="1048" y="80" text-anchor="end" fill="#8b949e" font-size="14">Backend Engineer @ KINOLIGHTS</text>

    <line x1="52" y1="106" x2="1048" y2="106" stroke="#293548" stroke-width="1"/>
    <g transform="translate(0 150)"><text x="52" class="label">Backend</text><line x1="185" x2="300" y1="-5" y2="-5" class="leader"/><text x="326" class="value">TypeScript · Node.js · NestJS</text></g>
    <g transform="translate(0 195)"><text x="52" class="label">API</text><line x1="185" x2="300" y1="-5" y2="-5" class="leader"/><text x="326" class="value">GraphQL · Apollo · REST</text></g>
    <g transform="translate(0 240)"><text x="52" class="label">Data</text><line x1="185" x2="300" y1="-5" y2="-5" class="leader"/><text x="326" class="value">MySQL · Prisma · TypeORM · DynamoDB</text></g>
    <g transform="translate(0 285)"><text x="52" class="label">AWS</text><line x1="185" x2="300" y1="-5" y2="-5" class="leader"/><text x="326" class="value">ECS Fargate · Lambda · RDS · SQS</text></g>
    <g transform="translate(0 330)"><text x="52" class="label">Ops</text><line x1="185" x2="300" y1="-5" y2="-5" class="leader"/><text x="326" class="value">Docker · GitHub Actions · Datadog · OpenSearch</text></g>
  </g>
</svg>
