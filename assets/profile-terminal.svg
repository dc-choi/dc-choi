<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1280 1325">
  <title id="title">DongChul Choi — terminal-style developer profile</title>
  <desc id="desc">ASCII portrait and a neofetch-inspired summary of DongChul Choi's backend role at KINOLIGHTS, work stack, links, and GitHub activity.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#0b1324"/>
    </linearGradient>
    <linearGradient id="portrait" x1="0" y1="0" x2="1" y2="1">
