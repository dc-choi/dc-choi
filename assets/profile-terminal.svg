      <stop offset="0.48" stop-color="#c4b5fd"/>
      <stop offset="1" stop-color="#f0abfc"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      .label { fill: #d29922; font-size: 16px; font-weight: 600; }
      .value { fill: #b6d7ff; font-size: 15px; }
      .leader { stroke: #3d4757; stroke-width: 1.4; stroke-dasharray: 2 6; }
      .divider { stroke: #293548; stroke-width: 1; }
      .stack-label { fill: #d29922; font-size: 14px; font-weight: 700; }
      .stack-value { fill: #b6d7ff; font-size: 12.7px; }
    </style>
  </defs>

